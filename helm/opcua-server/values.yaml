# Default values for EmberBurn - Multi-Protocol Industrial IoT Gateway
# "Where Data Meets Fire" - Fireball Industries
# NOTE: Do NOT create Namespace resources in Helm charts.
# Use: helm install <release> ./chart -n <namespace> --create-namespace

# Name overrides (consumed by templates/_helpers.tpl)
# nameOverride     — replaces the chart name in resource names and labels
# fullnameOverride — replaces the full "<release>-<chart>" resource name outright
nameOverride: ""
fullnameOverride: ""

# Pod configuration
pod:
  # Ignored when autoscaling.enabled is true — the HPA owns the replica count.
  replicaCount: 1

  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"

  labels: {}

  serviceAccount:
    create: true
    annotations: {}
    name: ""

# EmberBurn container configuration
emberburn:
  image:
    repository: ghcr.io/embernet-ai/emberburn
    tag: "4.1.11"
    pullPolicy: IfNotPresent # Use Always for development, IfNotPresent for production

  # OPC UA Server configuration
  opcua:
    updateInterval: 2.0
    logLevel: "INFO"
    endpoint: "opc.tcp://0.0.0.0:4840/freeopcua/server/"
    serverName: "EmberBurn Industrial IoT Gateway"
    namespace: "http://fireballindustries.com/emberburn"
    deviceName: "EmberBurn"

  # Protocol ports
  ports:
    opcua: 4840 # OPC UA Server
    webui: 5000 # REST API + Web UI
    prometheus: 8000 # Prometheus metrics
    # RESERVED — not yet wired into any template. Declared so the port map stays
    # complete; setting them today has no effect on the rendered manifests.
    modbus: 5020 # Modbus TCP (if enabled)
    websocket: 9001 # WebSocket (if enabled)

  # Environment variables
  # NOTE: UPDATE_INTERVAL and LOG_LEVEL come from emberburn.opcua.* below,
  # not from here — deployment.yaml reads emberburn.opcua.updateInterval /
  # emberburn.opcua.logLevel.
  env:
    pythonUnbuffered: "1"

  # Resource presets (small, medium, large, custom)
  resources:
    preset: "medium"

    # Custom resources (used when preset: custom)
    custom:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"

    # Preset definitions
    presets:
      small:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"

      medium:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "2Gi"

      large:
        requests:
          cpu: "500m"
          memory: "1Gi"
        limits:
          cpu: "2000m"
          memory: "4Gi"

  # Health checks - probe the Flask web UI (port 5000), NOT OPC UA (4840).
  # OPC UA server initialization is slow (tag loading, protocol handshake).
  # Flask starts instantly and is a reliable liveness indicator.
  # The probes target the container's named "webui" port so they track
  # emberburn.ports.webui automatically instead of hardcoding 5000.
  livenessProbe:
    enabled: true
    tcpSocket:
      port: webui
    initialDelaySeconds: 45
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 6

  readinessProbe:
    enabled: true
    tcpSocket:
      port: webui
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  # Security context
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false # EmberBurn writes logs and data
    capabilities:
      drop:
        - ALL

# Configuration - Tags and Publishers
config:
  # RESERVED — not yet wired into any template. The chart always renders the
  # tags/publishers ConfigMaps from the values below.
  # Use existing config from existing chart or define new
  useExisting: false

  # Config file to use (must exist in container)
  configFile: "config_transformations_demo.json"

  # Custom tags configuration (JSON)
  tags:
    Temperature:
      type: "float"
      initial_value: 20.0
      simulate: true
      simulation_type: "sine"
      min: 15.0
      max: 30.0
      units: "°C"
      description: "Ambient temperature"

    Pressure:
      type: "float"
      initial_value: 101.3
      simulate: true
      simulation_type: "random"
      min: 95.0
      max: 105.0
      units: "kPa"
      description: "System pressure"

    RunHours:
      type: "int"
      initial_value: 0
      simulate: true
      simulation_type: "increment"
      increment: 1
      max: 10000
      reset_on_max: true
      description: "Equipment run hours"

    SystemStatus:
      type: "string"
      initial_value: "Running"
      simulate: false
      description: "System operational status"

  # Publishers configuration
  publishers:
    # REST API & Web UI (always enabled)
    rest_api:
      enabled: true
      host: "0.0.0.0"
      port: 5000

    # MQTT Publisher
    mqtt:
      enabled: false
      broker: "mosquitto-mqtt-pod"
      port: 1883
      client_id: "emberburn"
      username: ""
      password: ""
      use_tls: false
      topic_prefix: "industrial/emberburn"
      qos: 1
      retain: false

    # InfluxDB Storage
    influxdb:
      enabled: false
      url: "http://influxdb-pod:8086"
      token: ""
      org: "fireball-industries"
      bucket: "emberburn"
      measurement: "tags"

    # Prometheus Metrics
    prometheus:
      enabled: true
      port: 8000
      path: "/metrics"

    # Sparkplug B (Ignition Edge)
    sparkplug:
      enabled: false
      broker: "mosquitto-mqtt-pod"
      port: 1883
      group_id: "Fireball"
      edge_node_id: "EmberBurn"

    # GraphQL API
    graphql:
      enabled: false
      port: 5000
      path: "/graphql"

    # Data Transformation
    data_transformation:
      enabled: true
      transformations: []
      computed_tags: []

    # Alarms
    alarms:
      enabled: true
      check_interval: 5
      notifications:
        email:
          enabled: false
          smtp_server: ""
          smtp_port: 587
          username: ""
          password: ""
          from_address: "emberburn@fireballindustries.com"
          to_addresses: []
        slack:
          enabled: false
          webhook_url: ""

    # SQLite Persistence
    sqlite_persistence:
      enabled: true
      db_file: "/app/data/emberburn.db"
      log_interval: 60

# Persistent storage configuration
persistence:
  enabled: true

  # Storage class (leave empty for default)
  storageClass: ""

  # Storage size
  size: "10Gi"

  # Access mode
  accessMode: ReadWriteOnce

  # Mount path in container
  mountPath: /app/data

  # Annotations
  annotations: {}

# Service configuration
service:
  # OPC UA Service
  opcua:
    type: ClusterIP
    port: 4840
    targetPort: 4840
    protocol: TCP
    annotations: {}

  # Web UI / REST API Service
  webui:
    type: ClusterIP
    port: 5000
    targetPort: 5000
    protocol: TCP
    # NodePort (only used if type: NodePort)
    nodePort: null
    annotations: {}

  # Prometheus Metrics Service
  prometheus:
    type: ClusterIP
    port: 8000
    targetPort: 8000
    protocol: TCP
    annotations: {}

  labels: {}

# Ingress configuration (for Web UI)
ingress:
  enabled: false
  className: "traefik"
  annotations:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: emberburn.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: emberburn-tls
  #    hosts:
  #      - emberburn.example.com

# Flux mesh integration — auto-discovered by the edge tunnel
# See: docs/flux_operability.md
flux:
  # -- Expose the Web UI service on the Flux mesh
  expose: true
  # -- Service name used in the Flux virtual address
  # Final address: <serviceName>-<site>-<node>.flux.internal
  serviceName: ""  # defaults to Chart.Name ("emberburn")
  # -- Port to expose through the mesh. Leave null to follow service.webui.port;
  # set an explicit port only to override it.
  port: null
  # -- Role attributes for policy matching
  roleAttributes: "gui-services"
  # -- Also expose the OPC UA service on the Flux mesh
  exposeOpcua: false
  # -- Also expose the Prometheus metrics service on the Flux mesh
  exposeMetrics: false

# Embernet Dashboard integration
# Per APP_STORE_DEPLOYMENT_FLOW.md: app-icon must be a full URL (rendered into
# Service annotation `embernet.ai/app-icon`). Bare filenames will not resolve
# from the dashboard origin.
embernet:
  appName: ""              # Defaults to "EmberBurn" via storeLabels helper
  displayName: ""          # Annotation: "Plant Floor / EmberBurn Production"
  guiType: "web"           # Mirrors gui.type — kept for backward compat
  device: ""               # Digital twin device: "plc-conveyor-01"
  # Value for the embernet.ai/app-icon annotation. Empty uses the EmberBurn
  # logo embedded in _helpers.tpl as a data URI, which works air-gapped and is
  # independent of which origin the dashboard renders it from. Override with a
  # URL only if your cluster can actually reach it.
  appIcon: ""

# GUI configuration — canonical EmberNET template section
# These values drive the storeLabels helper for dashboard discovery
gui:
  enabled: true            # RESERVED — no template reads this yet; GUI labels are always emitted
  port: null               # Leave null to follow service.webui.port; set to override
  type: "web"              # "web" | "shell" | "web+shell" | "none"
  displayName: ""          # Override app name on dashboard cards

# Image pull secrets for private registries
imagePullSecrets: []
#  - name: ghcr-pull-secret

# Node selector
nodeSelector: {}
#  node-role.kubernetes.io/industrial-iot: "true"

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Network configuration
# Per AUDIT_HELM_CHARTS.md §5 (Multi-Instance Compatibility): hostNetwork=true
# turns every containerPort into a host port and collides on second instance on
# the same node, breaking the App Store multi-instance deployment model.
# Per APP_STORE_DEPLOYMENT_FLOW.md: dashboard discovery uses ClusterIP FQDN
# (`<release>.<ns>.svc.cluster.local:<port>`); hostNetwork bypasses that path.
network:
  hostNetwork: false       # DEFAULT FALSE — dashboard proxy + multi-instance
  extraPorts: []           # RESERVED — not yet wired into deployment.yaml

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network Policy
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5000
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 4840
        # Prometheus metrics — service-prometheus.yaml/servicemonitor.yaml scrape
        # this port. Without it, enabling networkPolicy silently breaks scraping.
        - protocol: TCP
          port: 8000

  egress:
    - {} # Allow all egress by default

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Monitoring
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: "30s"
    scrapeTimeout: "10s"
    labels: {}

# External dependencies (optional integrations)
# RESERVED — no template reads this section. Point the publishers at external
# services via config.publishers.mqtt.broker / config.publishers.influxdb.url.
external:
  # MQTT Broker (if not using external)
  mqtt:
    deploy: false
    service: "mosquitto.default.svc.cluster.local"
    port: 1883

  # InfluxDB (if not using external)
  influxdb:
    deploy: false
    service: "influxdb.default.svc.cluster.local"
    port: 8086

# Environment variable sources (for Secrets/ConfigMaps)
# RESERVED — not yet wired into deployment.yaml.
envFrom: []

# ── Security ────────────────────────────────────────────────────────────────
security:
  # Name of a pre-existing Secret holding `apiKey` and/or `opcuaUsers`. Set this
  # to manage credentials outside the chart (sealed-secrets, external-secrets,
  # vault); when set, the chart creates no Secret of its own.
  existingSecret: ""

  # Shared token required on mutating REST calls (POST/PUT/DELETE on /api/*).
  # Reads stay open so the Embernet Dashboard can keep polling. Leave empty to
  # generate one at pod startup — writes then work from the UI but the token is
  # not knowable by external automation until you set it explicitly.
  apiKey: ""

  # Whether the web UI itself may write. The pod injects the token into the page
  # it serves, so the dashboard iframe keeps working with no login prompt.
  #
  # IMPORTANT: with ingress.enabled=true this means anyone who can load the page
  # can also write. For an internet-reachable deployment set this to false — the
  # UI becomes read-only and only clients holding the token (automation, curl)
  # can mutate tags.
  uiWrites: true

  # Allowed CORS origins. Empty list = same-origin only, which is what the
  # dashboard proxy needs. Previously CORS was wide open to every origin.
  corsOrigins: []

  opcua:
    # Require signing + encryption on port 4840. OFF by default because turning
    # it on breaks every existing anonymous SCADA client until each is
    # reconfigured with credentials and a trusted certificate. This is entirely
    # separate from the web UI and does not affect the dashboard iframe.
    enabled: false

    # Certificate and key paths inside the container. Required when enabled.
    # Mount them via a Secret volume; the chart does not generate certificates.
    certFile: "/app/certs/server-cert.der"
    keyFile: "/app/certs/server-key.pem"

    # Allow anonymous OPC UA sessions. Set false to require credentials from
    # security.opcua.users.
    allowAnonymous: true

    # "user1:pass1,user2:pass2" — stored in the chart-managed Secret. Required
    # when allowAnonymous is false. Prefer existingSecret for real deployments.
    users: ""

# ── Dashboard-injected values ───────────────────────────────────────────────
# The EmberNET dashboard sets these at deploy time (store.go:1304-1315 for the
# HelmChart path, :1182-1191 for Fleet). The chart is responsible for rendering
# them onto the pod template and Services — declared here so `helm show values`
# documents them and so a manual `helm install` can supply them.
#
# Omitting embernet.ai/tenant is the most common silent failure: the app stays
# visible to SuperAdmin while disappearing from every tenant-scoped view.
tenantLabels: {}
#  embernet.ai/tenant: "tranetech-ut3"
#  embernet.ai/deployed-by: "patrick@fireballz.ai"
#  embernet.ai/deployment-id: "abc123"
