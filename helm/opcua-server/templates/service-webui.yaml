# Web UI / REST API Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "emberburn.labels" . | nindent 4 }}
    {{- include "emberburn.storeLabels" . | nindent 4 }}
    service-type: webui
    {{- with .Values.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    # Injected by the dashboard (store.go:1304-1315). A Service without
    # embernet.ai/tenant is filtered out of every tenant-scoped view
    # (services.go:226) — visible to SuperAdmin, invisible to the customer.
    {{- with .Values.tenantLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    # Annotation, never a label: label values cannot contain '/' or ':'.
    # Read by the dashboard at client.go:307-309 (EmberNET App Store chart
    # contract §3). Also set on the pod template — §9.5: setting it only here
    # leaves node cards showing a generic glyph.
    #
    # Defaults to an embedded data URI rather than a URL. Embernet clusters are
    # air-gapped so a remote URL renders broken, and a pod-relative path would
    # resolve against the dashboard's origin, not ours.
    embernet.ai/app-icon: {{ include "emberburn.appIcon" . | quote }}
    {{- if .Values.embernet.displayName }}
    embernet.ai/display-name: {{ .Values.embernet.displayName | quote }}
    {{- end }}
    {{- if .Values.flux.expose }}
    flux.embernet.ai/expose: "true"
    flux.embernet.ai/service-name: {{ .Values.flux.serviceName | default .Release.Name | quote }}
    flux.embernet.ai/port: {{ .Values.flux.port | default .Values.service.webui.port | quote }}
    flux.embernet.ai/role-attributes: {{ .Values.flux.roleAttributes | default "gui-services" | quote }}
    {{- end }}
    {{- with .Values.service.webui.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.service.webui.type }}
  ports:
  - name: webui
    port: {{ .Values.service.webui.port }}
    targetPort: {{ .Values.service.webui.targetPort }}
    protocol: {{ .Values.service.webui.protocol }}
    {{- if and (eq .Values.service.webui.type "NodePort") .Values.service.webui.nodePort }}
    nodePort: {{ .Values.service.webui.nodePort }}
    {{- end }}
  selector:
    {{- include "emberburn.selectorLabels" . | nindent 4 }}
