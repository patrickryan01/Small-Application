{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "emberburn.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "emberburn.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- /* Only emit tls entries that actually name a secret — an entry without one
         is invalid, and the Rancher questions leave secretName empty for plain HTTP. */}}
  {{- $tls := list }}
  {{- range .Values.ingress.tls }}
    {{- if .secretName }}
    {{- $tls = append $tls . }}
    {{- end }}
  {{- end }}
  {{- if $tls }}
  tls:
    {{- range $tls }}
      {{- $hosts := .hosts }}
      {{- if not $hosts }}
      {{- /* No explicit tls hosts: cover every host declared on the ingress. */}}
      {{- $hosts = list }}
      {{- range $.Values.ingress.hosts }}
      {{- $hosts = append $hosts .host }}
      {{- end }}
      {{- end }}
    - hosts:
        {{- range $hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}
                port:
                  number: {{ $.Values.service.webui.port }}
          {{- end }}
    {{- end }}
{{- end }}
