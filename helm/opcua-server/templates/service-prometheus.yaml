# Prometheus Metrics Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "emberburn.labels" . | nindent 4 }}
    service-type: prometheus
    {{- with .Values.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    # Injected by the dashboard (store.go:1304-1315). A Service without
    # embernet.ai/tenant is filtered out of every tenant-scoped view
    # (services.go:226) — visible to SuperAdmin, invisible to the customer.
    {{- with .Values.tenantLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- if .Values.flux.exposeMetrics }}
    flux.embernet.ai/expose: "true"
    flux.embernet.ai/service-name: {{ printf "%s-metrics" (.Values.flux.serviceName | default .Chart.Name) | quote }}
    flux.embernet.ai/port: {{ .Values.service.prometheus.port | quote }}
    flux.embernet.ai/role-attributes: "monitoring"
    {{- end }}
    {{- with .Values.service.prometheus.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.service.prometheus.type }}
  ports:
  - name: prometheus
    port: {{ .Values.service.prometheus.port }}
    targetPort: {{ .Values.service.prometheus.targetPort }}
    protocol: {{ .Values.service.prometheus.protocol }}
  selector:
    {{- include "emberburn.selectorLabels" . | nindent 4 }}
