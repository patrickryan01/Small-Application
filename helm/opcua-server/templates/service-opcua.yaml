# OPC UA Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-opcua
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "emberburn.labels" . | nindent 4 }}
    service-type: opcua
    {{- with .Values.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    # Injected by the dashboard (store.go:1304-1315). A Service without
    # embernet.ai/tenant is filtered out of every tenant-scoped view
    # (services.go:226) — visible to SuperAdmin, invisible to the customer.
    {{- with .Values.tenantLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- if .Values.flux.exposeOpcua }}
    flux.embernet.ai/expose: "true"
    flux.embernet.ai/service-name: {{ printf "%s-opcua" (.Values.flux.serviceName | default .Chart.Name) | quote }}
    flux.embernet.ai/port: {{ .Values.service.opcua.port | quote }}
    flux.embernet.ai/role-attributes: {{ .Values.flux.roleAttributes | default "gui-services" | quote }}
    {{- end }}
    {{- with .Values.service.opcua.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.service.opcua.type }}
  ports:
  - name: opcua
    port: {{ .Values.service.opcua.port }}
    targetPort: {{ .Values.service.opcua.targetPort }}
    protocol: {{ .Values.service.opcua.protocol }}
  selector:
    {{- include "emberburn.selectorLabels" . | nindent 4 }}
