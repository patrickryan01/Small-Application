{{- if not .Values.security.existingSecret }}
{{- if or .Values.security.apiKey (not .Values.security.opcua.allowAnonymous) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "emberburn.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "emberburn.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.security.apiKey }}
  apiKey: {{ . | quote }}
  {{- end }}
  {{- if not .Values.security.opcua.allowAnonymous }}
  {{- if not .Values.security.opcua.users }}
  {{- fail "security.opcua.allowAnonymous=false requires security.opcua.users" }}
  {{- end }}
  opcuaUsers: {{ .Values.security.opcua.users | quote }}
  {{- end }}
{{- end }}
{{- end }}
